  {{- if and
      (include "normalizeBoolean" .Values.ingress.enabled)
      (include "normalizeBoolean" .Values.ingress.nginx.enabled)
      (not (include "normalizeBoolean" .Values.ingress.otc.enabled))
      (not (include "normalizeBoolean" .Values.ingress.tls.enabled)) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.name }}-svc
                port:
                  number: {{ .Values.service.ports.http }}
            pathType: Prefix
  {{- end }}
