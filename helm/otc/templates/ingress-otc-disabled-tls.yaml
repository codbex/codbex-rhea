# OTC ingress spec: https://docs.otc.t-systems.com/cloud-container-engine/umn/network/ingresses/loadbalancer_ingresses/using_kubectl_to_create_a_loadbalancer_ingress.html
{{- if and (include "normalizeBoolean" .Values.ingress.enabled | fromYaml) (include "normalizeBoolean" .Values.ingress.otc.enabled | fromYaml) (not (include "normalizeBoolean" .Values.ingress.tls.enabled | fromYaml)) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    kubernetes.io/elb.port: {{ .Values.ingress.port | quote }}

    {{- if .Values.ingress.otc.autocreate }}
    kubernetes.io/elb.class: union
    kubernetes.io/elb.autocreate:
      '{
          "name":"{{ .Values.name }}-elb",
          "type":"public",
          "bandwidth_name":"codbex-rhea-bandwidth",
          "bandwidth_chargemode":"traffic",
          "bandwidth_size":5,
          "bandwidth_sharetype":"PER",
          "eip_type":"5_bgp"
        }'
    {{- end }}

    {{- if not .Values.ingress.otc.autocreate }}
    kubernetes.io/elb.id: {{ .Values.ingress.otc.existingELB.id }} # Load balancer ID
    kubernetes.io/elb.class: {{ .Values.ingress.otc.existingELB.class }}   # Load balancer type
    {{- end }}

spec:
  {{- if and (include "normalizeBoolean" .Values.ingress.enabled | fromYaml) (include "normalizeBoolean" .Values.ingress.otc.enabled | fromYaml) }}
  ingressClassName: cce
  {{- end }}

  {{- if and (include "normalizeBoolean" .Values.ingress.enabled | fromYaml) (include "normalizeBoolean" .Values.ingress.nginx.enabled | fromYaml) }}
  ingressClassName: nginx
  {{- end }}

  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.name }}-svc
                port:
                  number: {{ .Values.service.ports.http }}
            pathType: Prefix
{{- end }}
