{{- if and
    (include "normalizeBoolean" .Values.ingress.enabled | fromYaml)
    (include "normalizeBoolean" .Values.ingress.nginx.enabled | fromYaml)
    (include "normalizeBoolean" .Values.ingress.tls.enabled | fromYaml)
    (not (include "normalizeBoolean" .Values.ingress.otc.enabled | fromYaml))
}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    {{- if (include "normalizeBoolean" .Values.ingress.tls.certManager.enabled | fromYaml) }}
    cert-manager.io/cluster-issuer: letsencrypt
    {{- end }}

    kubernetes.io/ingress.class: nginx

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.name }}-svc
                port:
                  number: {{ .Values.service.ports.http }}
            pathType: Prefix
      host: {{ .Values.ingress.tls.host }}
  tls:
    - hosts:
        - {{ .Values.ingress.tls.host }}
      secretName: {{ .Values.ingress.tls.secret }}
  {{- end }}
